name: Publish To OHPM

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 1.0.0). Leave empty to use tag name."
        required: false
        default: ""
        type: string
      dry_run:
        description: "Build only, skip ohpm publish"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: [self-hosted, macOS, ARM64]
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
    steps:
      - name: Resolve package version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version_input="${{ inputs.version }}"
          version_name="${version_input}"
          if [[ -z "${version_name}" ]]; then
            if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
              echo "workflow_dispatch from branch requires inputs.version" >&2
              exit 1
            fi
            version_name="${GITHUB_REF_NAME}"
          fi
          version_name="${version_name#v}"
          if [[ ! "${version_name}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "invalid version: ${version_name}" >&2
            exit 1
          fi
          printf 'version_name=%s\n' "${version_name}" >> "${GITHUB_OUTPUT}"

  publish:
    needs: resolve-version
    uses: NeptuneKit/.github/.github/workflows/ohpm-publish.yml@main
    with:
      version: ${{ needs.resolve-version.outputs.version_name }}
      dry_run: ${{ inputs.dry_run || false }}
      build_command: |
        HAR_PATH="$(bash scripts/ci/build-temp-har.sh "${{ needs.resolve-version.outputs.version_name }}" | tail -n 1)"
        test -n "${HAR_PATH}" && test -f "${HAR_PATH}"
        mkdir -p dist
        cp -f "${HAR_PATH}" dist/harmony_log.har
      har_path: dist/harmony_log.har
      license_path: LICENSE
      readme_path: README.md
      changelog_path: CHANGELOG.md
      publish_registry: https://ohpm.openharmony.cn/ohpm/
    secrets: inherit

  create-release:
    needs: [resolve-version, publish]
    if: ${{ needs.publish.result == 'success' && github.ref_type == 'tag' }}
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes from changelog
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version_name="${{ needs.resolve-version.outputs.version_name }}"
          tag_name="v${version_name}"
          notes_file="$(mktemp)"
          awk -v ver="## ${version_name} " '
            BEGIN { in_section=0 }
            $0 ~ "^## " && in_section==1 { exit }
            index($0, ver)==1 { in_section=1; next }
            in_section==1 { print }
          ' CHANGELOG.md > "${notes_file}"

          if [[ ! -s "${notes_file}" ]]; then
            printf 'Release %s\n\nPublished by tag workflow.\n' "${tag_name}" > "${notes_file}"
          fi

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const tag = `${{ steps.notes.outputs.tag_name }}`
            const notesPath = `${{ steps.notes.outputs.notes_file }}`
            const notes = fs.readFileSync(notesPath, 'utf8')
            const { owner, repo } = context.repo

            let existing = null
            try {
              const res = await github.rest.repos.getReleaseByTag({ owner, repo, tag })
              existing = res.data
            } catch (error) {
              if (error.status !== 404) throw error
            }

            if (existing) {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.id,
                tag_name: tag,
                name: tag,
                body: notes,
                draft: false,
                prerelease: false
              })
            } else {
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                body: notes,
                draft: false,
                prerelease: false
              })
            }
