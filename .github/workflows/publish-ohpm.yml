name: Publish To OHPM

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 1.0.0). Leave empty to use tag name."
        required: false
        default: ""
        type: string
      dry_run:
        description: "Build only, skip ohpm publish"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  resolve-version:
    runs-on: [self-hosted, macOS, ARM64]
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
    steps:
      - name: Resolve package version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version_input="${{ inputs.version }}"
          version_name="${version_input}"
          if [[ -z "${version_name}" ]]; then
            if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
              echo "workflow_dispatch from branch requires inputs.version" >&2
              exit 1
            fi
            version_name="${GITHUB_REF_NAME}"
          fi
          version_name="${version_name#v}"
          if [[ ! "${version_name}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "invalid version: ${version_name}" >&2
            exit 1
          fi
          printf 'version_name=%s\n' "${version_name}" >> "${GITHUB_OUTPUT}"

  publish:
    needs: resolve-version
    uses: NeptuneKit/.github/.github/workflows/ohpm-publish.yml@main
    with:
      version: ${{ needs.resolve-version.outputs.version_name }}
      dry_run: ${{ inputs.dry_run || false }}
      build_command: |
        HAR_PATH="$(bash scripts/ci/build-temp-har.sh "${{ needs.resolve-version.outputs.version_name }}")"
        mkdir -p dist
        cp -f "${HAR_PATH}" dist/harmony_log.har
      har_path: dist/harmony_log.har
      license_path: LICENSE
      readme_path: README.md
      changelog_path: CHANGELOG.md
      publish_registry: https://ohpm.openharmony.cn/ohpm/
    secrets: inherit
