name: Publish To OHPM (Manual)

'on':
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 1.0.0 or 2026.4.1.1)"
        required: true
        type: string
      dry_run:
        description: "Build only, skip ohpm publish"
        required: false
        default: false
        type: boolean
      force_rebuild_har:
        description: "Ignore dist/harmony_log.har and rebuild in CI"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      OHPM_REGISTRY: https://ohpm.openharmony.cn/ohpm/

    steps:
      - name: Resolve package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version_name="${{ inputs.version }}"
          version_name="${version_name#v}"
          if [[ ! "${version_name}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]] && [[ ! "${version_name}" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}(\.[0-9]+)?$ ]]; then
            echo "invalid version: ${version_name}" >&2
            exit 1
          fi
          printf 'version_name=%s\n' "${version_name}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Harmony command line tools
        shell: bash
        run: |
          set -euo pipefail
          release_json="$(curl -sSL -H 'Accept: application/vnd.github+json' https://api.github.com/repos/harmonyos-dev/hos-sdk/releases/latest)"
          asset_url="$(printf '%s' "${release_json}" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next((a.get("browser_download_url", "") for a in data.get("assets", []) if a.get("name", "").startswith("commandline-tools-linux-") and a.get("name", "").endswith(".zip")), ""))')"
          if [[ -z "${asset_url}" || "${asset_url}" == "null" ]]; then
            asset_url="https://github.com/harmonyos-dev/hos-sdk/releases/download/v2.0.2/commandline-tools-linux-2.0.0.2.zip"
          fi
          curl -sSL -o commandline-tools.zip "${asset_url}"
          unzip -q commandline-tools.zip
          mkdir -p "${HOME}/harmonyOS-command-line-tools"
          cp -R command-line-tools/* "${HOME}/harmonyOS-command-line-tools/"
          echo "${HOME}/harmonyOS-command-line-tools/bin" >> "${GITHUB_PATH}"
          echo "${HOME}/harmonyOS-command-line-tools/hvigor/bin" >> "${GITHUB_PATH}"
          echo "${HOME}/harmonyOS-command-line-tools/node_modules/.bin" >> "${GITHUB_PATH}"
          export JAVA_TOOL_OPTIONS="${JAVA_TOOL_OPTIONS:-} -Duser.country=CN"
          chmod +x "${HOME}/harmonyOS-command-line-tools/bin/hvigorw" 2>/dev/null || true
          chmod +x "${HOME}/harmonyOS-command-line-tools/hvigor/bin/hvigorw" 2>/dev/null || true
          chmod +x "${HOME}/harmonyOS-command-line-tools/hvigor/bin/hvigor" 2>/dev/null || true
          chmod +x "${HOME}/harmonyOS-command-line-tools/sdkmanager/bin/sdkmgr"
          "${HOME}/harmonyOS-command-line-tools/sdkmanager/bin/sdkmgr" install toolchains:9 OpenHarmony/toolchains:9 --accept-license
          hvigorw_bin="$(find "${HOME}/harmonyOS-command-line-tools" -type f -name hvigorw | head -n1 || true)"
          hvigor_bin="$(find "${HOME}/harmonyOS-command-line-tools" -type f -name hvigor | head -n1 || true)"
          if [[ -n "${hvigorw_bin}" ]]; then
            echo "HVIGORW_BIN=${hvigorw_bin}" >> "${GITHUB_ENV}"
          fi
          if [[ -n "${hvigor_bin}" ]]; then
            echo "HVIGOR_BIN=${hvigor_bin}" >> "${GITHUB_ENV}"
          fi
          if [[ -x "${HOME}/harmonyOS-command-line-tools/bin/init.sh" ]]; then
            bash "${HOME}/harmonyOS-command-line-tools/bin/init.sh" || true
          fi
          if [[ -x "${HOME}/harmonyOS-command-line-tools/ohpm/bin/init.sh" ]]; then
            bash "${HOME}/harmonyOS-command-line-tools/ohpm/bin/init.sh" || true
          fi
          if [[ -x "${HOME}/harmonyOS-command-line-tools/ohpm/bin/init" ]]; then
            "${HOME}/harmonyOS-command-line-tools/ohpm/bin/init" || true
          fi

      - name: Build HAR in temporary Harmony shell project
        if: ${{ inputs.force_rebuild_har || hashFiles('dist/harmony_log.har') == '' }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/build-temp-har.sh "${{ steps.version.outputs.version_name }}"

      - name: Use prebuilt HAR from repository
        if: ${{ !inputs.force_rebuild_har && hashFiles('dist/harmony_log.har') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "HAR_FILE_PATH=${GITHUB_WORKSPACE}/dist/harmony_log.har" >> "${GITHUB_ENV}"

      - name: Configure OHPM publish credentials
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          OHPM_PRIVATE_KEY_PEM: ${{ secrets.OHPM_PRIVATE_KEY_PEM }}
          OHPM_PUBLISH_ID: ${{ secrets.OHPM_PUBLISH_ID }}
          OHPM_TOKEN: ${{ secrets.OHPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${OHPM_PRIVATE_KEY_PEM}" ]]; then
            echo "OHPM_PRIVATE_KEY_PEM is required for publish." >&2
            exit 1
          fi
          if [[ -z "${OHPM_PUBLISH_ID}" ]]; then
            echo "OHPM_PUBLISH_ID is required for publish." >&2
            exit 1
          fi
          mkdir -p "${HOME}/.ohpm"
          key_path="${HOME}/.ohpm/publish_key.pem"
          printf '%s\n' "${OHPM_PRIVATE_KEY_PEM}" > "${key_path}"
          chmod 600 "${key_path}"
          echo "OHPM_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"
          ohpm config set key_path "${key_path}"
          ohpm config set publish_id "${OHPM_PUBLISH_ID}"
          ohpm config set registry "${OHPM_REGISTRY}"
          if [[ -n "${OHPM_TOKEN:-}" ]]; then
            printf '\n//ohpm.openharmony.cn/ohpm/:_auth="%s"\n' "${OHPM_TOKEN}" >> "${HOME}/.ohpm/.ohpmrc"
          fi

      - name: Publish HAR to OHPM
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          OHPM_KEY_PASSPHRASE: ${{ secrets.OHPM_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail
          har_file="${HAR_FILE_PATH:-}"
          if [[ -z "${har_file}" || ! -f "${har_file}" ]]; then
            echo "HAR_FILE_PATH is missing or invalid." >&2
            exit 1
          fi
          har_dir="$(dirname "${har_file}")"
          har_name="$(basename "${har_file}")"
          cd "${har_dir}"
          publish_log="$(mktemp)"
          ohpm_status=0
          if [[ -n "${OHPM_KEY_PASSPHRASE:-}" ]]; then
            set +e
            printf '%s\n' "${OHPM_KEY_PASSPHRASE}" | ohpm publish "${har_name}" --publish_registry "${OHPM_REGISTRY}" 2>&1 | tee "${publish_log}"
            ohpm_status=${PIPESTATUS[1]}
            set -e
          else
            set +e
            ohpm publish "${har_name}" --publish_registry "${OHPM_REGISTRY}" 2>&1 | tee "${publish_log}"
            ohpm_status=${PIPESTATUS[0]}
            set -e
          fi
          if [[ "${ohpm_status}" -ne 0 ]]; then
            exit "${ohpm_status}"
          fi
          if grep -Eq 'ohpm ERROR| ERROR:' "${publish_log}"; then
            echo "Detected ohpm error output in publish log." >&2
            exit 1
          fi
