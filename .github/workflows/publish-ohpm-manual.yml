name: Publish To OHPM (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 1.0.0 or 2026.4.1.1)"
        required: true
        type: string
      dry_run:
        description: "Build only, skip ohpm publish"
        required: false
        default: false
        type: boolean
      force_rebuild_har:
        description: "Reserved option, current org workflow always rebuilds"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  resolve-version:
    runs-on: [self-hosted, macOS, ARM64]
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
    steps:
      - name: Resolve package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version_name="${{ inputs.version }}"
          version_name="${version_name#v}"
          if [[ ! "${version_name}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]] && [[ ! "${version_name}" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}(\.[0-9]+)?$ ]]; then
            echo "invalid version: ${version_name}" >&2
            exit 1
          fi
          printf 'version_name=%s\n' "${version_name}" >> "${GITHUB_OUTPUT}"

  publish:
    needs: resolve-version
    uses: NeptuneKit/.github/.github/workflows/ohpm-publish.yml@main
    with:
      version: ${{ needs.resolve-version.outputs.version_name }}
      dry_run: ${{ inputs.dry_run }}
      build_command: |
        HAR_PATH="$(bash scripts/ci/build-temp-har.sh "${{ needs.resolve-version.outputs.version_name }}" | tail -n 1)"
        test -n "${HAR_PATH}" && test -f "${HAR_PATH}"
        mkdir -p dist
        cp -f "${HAR_PATH}" dist/harmony_log.har
      har_path: dist/harmony_log.har
      license_path: LICENSE
      readme_path: README.md
      changelog_path: CHANGELOG.md
      publish_registry: https://ohpm.openharmony.cn/ohpm/
    secrets: inherit
