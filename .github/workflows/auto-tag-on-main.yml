name: Auto Tag On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Require PAT for tag push trigger
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.RELEASE_BOT_TOKEN }}" ]]; then
            echo "Missing required secret: RELEASE_BOT_TOKEN" >&2
            echo "Use a PAT with repo + workflow scopes to push tags and trigger publish workflows." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BOT_TOKEN }}

      - name: Create next semantic tag for current commit
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          current_sha="$(git rev-parse HEAD)"
          if git tag --points-at "${current_sha}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' >/dev/null 2>&1; then
            echo "Current commit already has semantic version tag, skip."
            echo "should_push=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            next_tag="v1.0.0"
          else
            version="${latest_tag#v}"
            major="${version%%.*}"
            rest="${version#*.}"
            minor="${rest%%.*}"
            patch="${version##*.}"
            next_patch=$((patch + 1))
            next_tag="v${major}.${minor}.${next_patch}"
          fi

          echo "next_tag=${next_tag}" >> "${GITHUB_OUTPUT}"
          echo "should_push=true" >> "${GITHUB_OUTPUT}"

      - name: Push tag
        if: ${{ steps.tag.outputs.should_push == 'true' }}
        env:
          RELEASE_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          next_tag="${{ steps.tag.outputs.next_tag }}"
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_BOT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag -a "${next_tag}" -m "Auto release ${next_tag}" "${GITHUB_SHA}"
          git push origin "${next_tag}"
